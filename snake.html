<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: #0f1119;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 460px;
    padding: 0 4px;
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    color: #81c784;
    letter-spacing: 1px;
  }

  .scores {
    display: flex;
    gap: 20px;
    font-size: 13px;
    color: #aab;
  }

  .scores span { color: #e0e0e0; font-weight: 600; }

  canvas {
    border: 2px solid #2a2d3a;
    border-radius: 6px;
    background: #141822;
    display: block;
  }

  .controls {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }

  .controls button {
    width: 50px;
    height: 50px;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    background: #1c1f2b;
    color: #ccc;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s;
  }

  .controls button:active { background: #2e3344; }

  .dpad {
    display: grid;
    grid-template-columns: 50px 50px 50px;
    grid-template-rows: 50px 50px 50px;
    gap: 6px;
  }

  .dpad .up    { grid-column: 2; grid-row: 1; }
  .dpad .left  { grid-column: 1; grid-row: 2; }
  .dpad .center{ grid-column: 2; grid-row: 2; background: transparent; border: none; pointer-events: none; }
  .dpad .right { grid-column: 3; grid-row: 2; }
  .dpad .down  { grid-column: 2; grid-row: 3; }

  .hint {
    color: #4a5066;
    font-size: 11px;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  @media (min-width: 600px) {
    .controls { display: none; }
    .hint { margin-top: 14px; }
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="header">
    <div class="title">贪吃蛇</div>
    <div class="scores">
      <div>得分 <span id="score">0</span></div>
      <div>最高 <span id="highScore">0</span></div>
    </div>
  </div>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <div class="dpad">
      <button class="up"    data-dir="up">    ▲</button>
      <button class="left"  data-dir="left">  ◀</button>
      <div class="center"></div>
      <button class="right" data-dir="right"> ▶</button>
      <button class="down"  data-dir="down">  ▼</button>
    </div>
  </div>
  <div class="hint">方向键 / WASD 移动 · 空格暂停</div>
</div>

<script>
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const COLS = 20;
  const ROWS = 20;
  const CELL = 23;
  const GAP = 1;
  const TOTAL = CELL + GAP;
  canvas.width = COLS * TOTAL + GAP;
  canvas.height = ROWS * TOTAL + GAP;

  const scoreEl = document.getElementById("score");
  const highScoreEl = document.getElementById("highScore");

  let snake, food, dir, nextDir, score, highScore, gameLoop, running, paused;
  let speed = 130;
  let particles = [];

  function loadHighScore() {
    try { highScore = parseInt(localStorage.getItem("snake_highscore")) || 0; }
    catch (_) { highScore = 0; }
    highScoreEl.textContent = highScore;
  }

  function saveHighScore() {
    if (score > highScore) {
      highScore = score;
      highScoreEl.textContent = highScore;
      try { localStorage.setItem("snake_highscore", highScore); } catch (_) {}
    }
  }

  function randomCell() {
    return { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  }

  function occupiedBySnake(x, y) {
    return snake.some(s => s.x === x && s.y === y);
  }

  function spawnFood() {
    let pos;
    do { pos = randomCell(); } while (occupiedBySnake(pos.x, pos.y));
    food = pos;
  }

  function init() {
    const midX = Math.floor(COLS / 2);
    const midY = Math.floor(ROWS / 2);
    snake = [
      { x: midX,     y: midY },
      { x: midX - 1, y: midY },
      { x: midX - 2, y: midY },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    speed = 130;
    particles = [];
    scoreEl.textContent = "0";
    spawnFood();
  }

  function setDirection(dx, dy) {
    if (dx === -dir.x && dy === -dir.y) return;
    if (dx === 0 && dy === 0) return;
    nextDir = { x: dx, y: dy };
  }

  function spawnParticles(x, y) {
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.5;
      const spd = 1.2 + Math.random() * 2;
      particles.push({
        x: x * TOTAL + TOTAL / 2,
        y: y * TOTAL + TOTAL / 2,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 1,
        decay: 0.03 + Math.random() * 0.03,
        size: 2 + Math.random() * 2.5,
      });
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.fillStyle = `rgba(129,199,132,${p.life.toFixed(2)})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function step() {
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();

    if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = score;
      saveHighScore();
      spawnParticles(food.x, food.y);
      spawnFood();
      if (speed > 60) { speed -= 1; clearInterval(gameLoop); gameLoop = setInterval(tick, speed); }
    } else {
      snake.pop();
    }
  }

  function gameOver() {
    running = false;
    clearInterval(gameLoop);
  }

  function tick() {
    if (!running || paused) return;
    step();
    updateParticles();
    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < snake.length; i++) {
      const s = snake[i];
      const px = s.x * TOTAL + GAP;
      const py = s.y * TOTAL + GAP;
      if (i === 0) {
        ctx.fillStyle = "#81c784";
        ctx.shadowColor = "rgba(129,199,132,0.6)";
        ctx.shadowBlur = 8;
      } else {
        const ratio = 1 - i / (snake.length + 8);
        const g = Math.floor(150 + 49 * ratio);
        ctx.fillStyle = `rgb(60,${g},70)`;
        ctx.shadowColor = "transparent";
        ctx.shadowBlur = 0;
      }
      ctx.beginPath();
      ctx.roundRect(px, py, CELL, CELL, i === 0 ? 5 : 3);
      ctx.fill();
    }
    ctx.shadowColor = "transparent";
    ctx.shadowBlur = 0;

    {
      const fx = food.x * TOTAL + GAP;
      const fy = food.y * TOTAL + GAP;
      const t = Date.now() / 300;
      const pulse = 1 + 0.12 * Math.sin(t);
      ctx.fillStyle = "#ff6e6e";
      ctx.shadowColor = "rgba(255,110,110,0.5)";
      ctx.shadowBlur = 10 * pulse;
      ctx.beginPath();
      const cx = fx + CELL / 2;
      const cy = fy + CELL / 2;
      const r = (CELL / 2 - 1) * pulse;
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowColor = "transparent";
    ctx.shadowBlur = 0;

    drawParticles();

    if (!running) {
      ctx.fillStyle = "rgba(15,17,25,0.78)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#e0e0e0";
      ctx.font = "bold 26px 'Segoe UI', system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("游戏结束", canvas.width / 2, canvas.height / 2 - 12);
      ctx.fillStyle = "#81c784";
      ctx.font = "14px 'Segoe UI', system-ui, sans-serif";
      ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2 + 18);
      ctx.fillStyle = "#8a8fa0";
      ctx.font = "12px 'Segoe UI', system-ui, sans-serif";
      ctx.fillText("按空格键重新开始", canvas.width / 2, canvas.height / 2 + 44);
    } else if (paused) {
      ctx.fillStyle = "rgba(15,17,25,0.55)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ccc";
      ctx.font = "bold 22px 'Segoe UI', system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("已暂停", canvas.width / 2, canvas.height / 2);
    }
  }

  document.addEventListener("keydown", e => {
    const key = e.key;
    e.preventDefault();
    if (key === "ArrowUp"    || key === "w" || key === "W") setDirection(0, -1);
    if (key === "ArrowDown"  || key === "s" || key === "S") setDirection(0, 1);
    if (key === "ArrowLeft"  || key === "a" || key === "A") setDirection(-1, 0);
    if (key === "ArrowRight" || key === "d" || key === "D") setDirection(1, 0);
    if (key === " " || key === "Spacebar") {
      if (!running) { init(); running = true; gameLoop = setInterval(tick, speed); draw(); }
      else { paused = !paused; draw(); }
    }
  });

  document.querySelectorAll("[data-dir]").forEach(btn => {
    btn.addEventListener("click", () => {
      const d = btn.dataset.dir;
      if (d === "up")    setDirection(0, -1);
      if (d === "down")  setDirection(0, 1);
      if (d === "left")  setDirection(-1, 0);
      if (d === "right") setDirection(1, 0);
    });
  });

  let touchStartX = 0, touchStartY = 0;
  canvas.addEventListener("touchstart", e => {
    e.preventDefault();
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, { passive: false });

  canvas.addEventListener("touchend", e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 20) return;
    if (absDx > absDy) { setDirection(dx > 0 ? 1 : -1, 0); }
    else              { setDirection(0, dy > 0 ? 1 : -1); }
  });

  loadHighScore();
  init();
  running = true;
  paused = false;
  gameLoop = setInterval(tick, speed);
  draw();
</script>
</body>
</html>
